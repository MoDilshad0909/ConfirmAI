version: '3.8'

services:
  web:
    build: .
    container_name: railwise_web
    restart: always
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=railwise_user
      - DB_PASSWORD=railwise_secure_pass
      - DB_NAME=railwise_db
      - SQLALCHEMY_DATABASE_URI=mysql+pymysql://railwise_user:railwise_secure_pass@db:3306/railwise_db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: railwise_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_secret_pass
      MYSQL_DATABASE: railwise_db
      MYSQL_USER: railwise_user
      MYSQL_PASSWORD: railwise_secure_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
