<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="ConfirmAI – Smart Waitlist Confirmation Predictor powered by Machine Learning">
<title>{% block title %}ConfirmAI{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
<style>
  @keyframes slideIn { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
  @keyframes slideOut { to { opacity:0; transform:translateX(40px); } }
</style>
{% block head %}{% endblock %}
</head>
<body>

<!-- Loader -->
<div class="loader-overlay" id="loaderOverlay">
  <div class="text-center">
    <div class="spinner-glow mx-auto mb-3"></div>
    <p style="color:var(--text-muted);font-size:.9rem;">Analysing…</p>
  </div>
</div>

<!-- Toast Container -->
<div id="toastContainer" style="position:fixed;top:80px;right:20px;z-index:9998;display:flex;flex-direction:column;gap:10px;"></div>

<!-- Navbar -->
<nav class="navbar navbar-glass navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand navbar-brand-text d-flex align-items-center gap-2" href="/">
      <i class="fa-solid fa-train-subway" style="color:var(--primary);"></i> ConfirmAI
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" style="border-color:var(--border-glass);color:var(--text-primary);">
      <i class="fa fa-bars"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="/"><i class="fa fa-home me-1"></i>Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fa fa-chart-line me-1"></i>Predict</a></li>
        <li class="nav-item"><a class="nav-link" href="/history"><i class="fa fa-history me-1"></i>History</a></li>
        <li class="nav-item"><a class="nav-link" href="/download-app" style="color:var(--primary);"><i class="fa fa-mobile-screen me-1"></i>Get App</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <button id="themeToggleBtn" class="theme-toggle" title="Toggle theme"></button>
        <div id="navAuthSection"></div>
      </div>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<!-- Footer -->
<footer style="border-top:1px solid var(--border-glass);padding:32px 0;margin-top:80px;position:relative;z-index:1;">
  <div class="container text-center">
    <p class="mb-1" style="color:var(--text-muted);font-size:.85rem;">
      © 2026 <span class="gradient-text font-weight-bold">ConfirmAI</span> — Smart Waitlist Confirmation Predictor
    </p>
    <p style="color:var(--text-muted);font-size:.78rem;">Built with Flask · XGBoost · Bootstrap 5</p>
    <div class="mt-3">
      <a href="/download-app" class="btn btn-sm" style="background:var(--primary);color:#fff;border-radius:20px;padding:6px 16px;"><i class="fa fa-download me-2"></i>Download Mobile App</a>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
